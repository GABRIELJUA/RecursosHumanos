<div class="min-h-screen bg-slate-50 font-['Plus_Jakarta_Sans'] flex flex-col">

  <div class="min-h-screen bg-slate-50 font-['Plus_Jakarta_Sans'] flex flex-col">

    <!-- HEADER -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50 backdrop-blur-sm">
      <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">

        <!-- LOGO -->
        <a routerLink="/" class="flex items-center">

          <img src="assets/img/logo/logoHotel.png"
            class="h-16 w-auto object-contain transition-transform duration-300 hover:scale-105">
        </a>


        <!-- NAV DESKTOP -->
        <nav class="hidden md:flex items-center gap-8">

          <!-- INICIO -->
          <a routerLink="/" routerLinkActive="text-[#e67e22]"
            class="flex items-center gap-2 text-sm font-semibold text-slate-600 hover:text-[#e67e22] transition">

            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="m2.25 12 8.954-8.955a.75.75 0 0 1 1.06 0L21.75 12M4.5 9.75V19.5a.75.75 0 0 0 .75.75h4.5v-6a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 .75.75v6h4.5a.75.75 0 0 0 .75-.75V9.75" />
            </svg>

            Inicio
          </a>


          <!-- BUZON -->
          <a *ngIf="!isMobile" routerLink="/buzon" routerLinkActive="text-[#e67e22]"
            class="flex items-center gap-2 text-sm font-semibold text-slate-600 hover:text-[#e67e22] transition">

            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.75 7.5v9a2.25 2.25 0 0 1-2.25 2.25H4.5A2.25 2.25 0 0 1 2.25 16.5v-9A2.25 2.25 0 0 1 4.5 5.25h15A2.25 2.25 0 0 1 21.75 7.5Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="m3 7.5 9 6 9-6" />
            </svg>

            Buzón
          </a>


          <!-- GALERIA (ICONO NUEVO) -->
          <a routerLink="/galeria" routerLinkActive="text-[#e67e22]"
            class="flex items-center gap-2 text-sm font-semibold text-slate-600 hover:text-[#e67e22] transition">

            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 16.5V7.5A2.25 2.25 0 0 1 5.25 5.25h13.5A2.25 2.25 0 0 1 21 7.5v9a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 16.5Z" />
              <path stroke-linecap="round" stroke-linejoin="round"
                d="m3 16 5.25-5.25a1.5 1.5 0 0 1 2.12 0L15 15l1.72-1.72a1.5 1.5 0 0 1 2.12 0L21 15" />
              <circle cx="8.5" cy="9" r="1.5" />
            </svg>

            Galería
          </a>


          <!-- BIBLIOTECA -->
          <a routerLink="/biblioteca" routerLinkActive="text-[#e67e22]"
            class="flex items-center gap-2 text-sm font-semibold text-slate-600 hover:text-[#e67e22] transition">

            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 6.75A2.25 2.25 0 0 1 5.25 4.5h13.5A2.25 2.25 0 0 1 21 6.75v10.5A2.25 2.25 0 0 1 18.75 19.5H5.25A2.25 2.25 0 0 1 3 17.25V6.75" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 9h9M7.5 12h9M7.5 15h6" />
            </svg>

            Biblioteca
          </a>


          <!-- LOGIN -->
          <a routerLink="/login"
            class="flex items-center gap-2 px-5 py-2 bg-[#2962ff] text-white text-sm font-bold rounded-xl hover:bg-[#1e4bd8] transition shadow-md">

            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6A2.25 2.25 0 005.25 5.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M18 12H9m0 0l3-3m-3 3l3 3" />
            </svg>

            Login
          </a>

        </nav>


        <!-- BOTÓN HAMBURGUESA -->
        <button class="md:hidden p-2 rounded-lg hover:bg-slate-100 transition" (click)="menuOpen = true">

          <svg class="w-7 h-7 text-slate-700" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>

        </button>

      </div>
    </header>


    <!-- MENÚ MOBILE -->
    <div class="mobile-menu md:hidden" [class.open]="menuOpen">

      <!-- OVERLAY -->
      <div class="mobile-overlay" (click)="menuOpen = false">
      </div>

      <!-- DRAWER -->
      <nav class="mobile-drawer bg-white shadow-2xl p-8 flex flex-col gap-6">

        <!-- CLOSE -->
        <button class="self-end p-2 rounded-lg hover:bg-slate-100 transition" (click)="menuOpen = false">

          <svg class="w-6 h-6 text-slate-600" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>

        </button>


        <!-- INICIO -->
        <a routerLink="/"
          class="flex items-center gap-3 text-lg font-semibold text-slate-700 hover:text-[#e67e22] transition"
          (click)="menuOpen=false">

          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="m2.25 12 8.954-8.955a.75.75 0 0 1 1.06 0L21.75 12M4.5 9.75V19.5a.75.75 0 0 0 .75.75h4.5v-6a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 .75.75v6h4.5a.75.75 0 0 0 .75-.75V9.75" />
          </svg>

          Inicio
        </a>


        <!-- BUZON -->
        <a *ngIf="!isMobile" routerLink="/buzon"
          class="flex items-center gap-3 text-lg font-semibold text-slate-700 hover:text-[#e67e22] transition"
          (click)="menuOpen=false">

          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M21.75 7.5v9a2.25 2.25 0 0 1-2.25 2.25H4.5A2.25 2.25 0 0 1 2.25 16.5v-9A2.25 2.25 0 0 1 4.5 5.25h15A2.25 2.25 0 0 1 21.75 7.5Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="m3 7.5 9 6 9-6" />
          </svg>

          Buzón
        </a>


        <!-- GALERIA -->
        <a routerLink="/galeria"
          class="flex items-center gap-3 text-lg font-semibold text-slate-700 hover:text-[#e67e22] transition"
          (click)="menuOpen=false">

          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 16.5V7.5A2.25 2.25 0 0 1 5.25 5.25h13.5A2.25 2.25 0 0 1 21 7.5v9a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 16.5Z" />
            <path stroke-linecap="round" stroke-linejoin="round"
              d="m3 16 5.25-5.25a1.5 1.5 0 0 1 2.12 0L15 15l1.72-1.72a1.5 1.5 0 0 1 2.12 0L21 15" />
            <circle cx="8.5" cy="9" r="1.5" />
          </svg>

          Galería
        </a>


        <!-- BIBLIOTECA -->
        <a routerLink="/biblioteca"
          class="flex items-center gap-3 text-lg font-semibold text-slate-700 hover:text-[#e67e22] transition"
          (click)="menuOpen=false">

          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3 6.75A2.25 2.25 0 0 1 5.25 4.5h13.5A2.25 2.25 0 0 1 21 6.75v10.5A2.25 2.25 0 0 1 18.75 19.5H5.25A2.25 2.25 0 0 1 3 17.25V6.75Z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 9h9M7.5 12h9M7.5 15h6" />
          </svg>

          Biblioteca
        </a>

        <!-- LOGIN -->
        <a routerLink="/login"
          class="flex items-center gap-3 text-lg font-semibold text-slate-700 hover:text-[#e67e22] transition"
          (click)="menuOpen=false">

          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6A2.25 2.25 0 005.25 5.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 12H9m0 0l3-3m-3 3l3 3" />
          </svg>

          Login
        </a>

      </nav>

    </div>



    <!-- MAIN -->
    <main class="flex-1">
      <router-outlet></router-outlet>
    </main>



    <!-- FOOTER -->
    <footer class="bg-[#e67e22] py-8 text-white">
      <div class="max-w-7xl mx-auto px-6 text-center text-sm font-medium">
        © 2026 <strong>Posada de Tampico</strong>. Todos los derechos reservados.
      </div>
    </footer>

  </div>
