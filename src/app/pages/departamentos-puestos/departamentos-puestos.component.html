<div class="space-y-6">

    <!-- ================= HEADER ================= -->
    <div class="flex items-center justify-between">

        <div>
            <h2 class="text-xl font-semibold text-slate-800 dark:text-white">
                Departamentos
            </h2>

            <p class="text-xs text-slate-400 mt-1">
                Administración de departamentos y puestos
            </p>
        </div>

        <button (click)="mostrarCrearDepto = !mostrarCrearDepto" class="inline-flex items-center gap-2 px-4 py-2 text-xs font-semibold
      bg-orange-500 text-white rounded-md
      hover:bg-orange-600 transition">

            + Nuevo departamento

        </button>

    </div>


    <!-- ================= CREAR DEPARTAMENTO ================= -->
    <div *ngIf="mostrarCrearDepto" class="bg-white dark:bg-[#020617]
              border border-slate-200 dark:border-slate-800
              rounded-xl p-4 flex gap-2">

        <input [(ngModel)]="nuevoDepto" placeholder="Nombre del departamento" class="flex-1 px-3 py-2 text-sm
             border border-slate-300 dark:border-slate-700
             bg-slate-50 dark:bg-slate-900
             rounded-md
             focus:outline-none focus:ring-2 focus:ring-orange-500/20">

        <button (click)="crearDepartamento()" class="px-4 py-2 text-xs font-semibold
             bg-orange-500 text-white
             rounded-md hover:bg-orange-600 transition">

            Crear

        </button>

    </div>


    <!-- ================= CONTENEDOR ================= -->
    <div class="bg-white dark:bg-[#020617]
              border border-slate-200 dark:border-slate-800
              rounded-xl p-4 space-y-2">

        <div *ngFor="let d of departamentos" class="border-b border-slate-100 dark:border-slate-800 pb-2">

            <!-- ================= CABECERA ================= -->
            <button (click)="toggleDepartamento(d)" class="w-full flex items-center justify-between py-2
                    text-sm font-semibold
                    text-slate-700 dark:text-slate-200
                    hover:text-orange-500 transition">

                <div class="flex items-center gap-3">

                    <svg class="w-4 h-4 transition-transform" [ngClass]="{'rotate-90': d.abierto}" fill="none"
                        stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">

                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />

                    </svg>

                    <span>{{ d.nombre }}</span>

                    <button (click)="eliminarDepartamento(d.id)" class="text-[11px] font-semibold
                                                                    text-red-500 hover:text-red-600
                                                                    px-2 py-1 rounded
                                                                    hover:bg-red-50 dark:hover:bg-red-900/20
                                                                    transition">

                        eliminar

                    </button>

                </div>

                <span class="text-xs text-slate-400">
                    {{ d.puestos.length }} puestos
                </span>

            </button>


            <!-- ================= PUESTOS ================= -->
            <div *ngIf="d.abierto" class="ml-6 mt-2 space-y-1">

                <!-- LISTA -->
                <div *ngFor="let p of d.puestos" class="flex items-center justify-between
             text-sm text-slate-600 dark:text-slate-300
             py-1 px-2 rounded-md
             hover:bg-slate-100 dark:hover:bg-slate-800">

                    <span>
                        {{ p.nombre }}
                    </span>

                    <div class="flex items-center gap-3 text-xs">

                        <button (click)="editarPuesto(p)" class="text-blue-600 hover:text-blue-700">

                            Editar

                        </button>

                        <button (click)="eliminarPuesto(p.id)" class="text-red-600 hover:text-red-700">

                            Eliminar

                        </button>

                    </div>

                </div>


                <!-- ================= CREAR PUESTO ================= -->
                <div class="flex gap-2 mt-2">

                    <input [(ngModel)]="d.nuevoPuesto" placeholder="Nuevo puesto" class="px-2 py-1 text-xs
                   border border-slate-300 dark:border-slate-700
                   bg-slate-50 dark:bg-slate-900
                   rounded-md
                   focus:outline-none focus:ring-2 focus:ring-orange-500/20">

                    <button (click)="crearPuesto(d)" class="text-xs px-3 py-1
                   bg-orange-500 text-white
                   rounded-md hover:bg-orange-600 transition">

                        Agregar

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>
