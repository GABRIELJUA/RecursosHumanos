<div class="space-y-6">

    <!-- ================= HEADER ================= -->
    <div class="flex items-center justify-between">

        <div>
            <h2 class="text-xl font-semibold text-slate-800 dark:text-white">
                Gestión de Banner
            </h2>

            <p class="text-xs text-slate-400 mt-1">
                Administración de banners del portal institucional
            </p>
        </div>

        <button (click)="openModal()" class="inline-flex items-center gap-2 px-4 py-2 text-xs font-semibold
            bg-orange-500 text-white rounded-md
            hover:bg-orange-600 transition">

            + Nuevo banner

        </button>

    </div>


    <!-- ================= CONTENEDOR ================= -->

    <div class="bg-white dark:bg-[#020617]
        border border-slate-200 dark:border-slate-800
        rounded-xl p-6">


        <!-- LOADING -->

        <div *ngIf="loading" class="text-center py-10 text-slate-500 text-sm">

            Cargando banners...

        </div>


        <!-- SIN DATOS -->

        <div *ngIf="!loading && !banners.length" class="text-center py-10 text-slate-400 text-sm">

            No hay banners registrados.

        </div>


        <!-- GRID -->

        <div *ngIf="!loading && banners.length"
            class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">

            <div *ngFor="let banner of banners" class="border border-slate-200 dark:border-slate-800
                rounded-lg overflow-hidden
                hover:bg-slate-50 dark:hover:bg-slate-900
                transition group">


                <!-- Imagen -->

                <div class="h-40 overflow-hidden bg-slate-100 dark:bg-slate-900">

                    <img [src]="'http://localhost:3000' + banner.imagen" class="w-full h-full object-cover
                        group-hover:scale-105 transition duration-300">

                </div>


                <!-- Info -->

                <div class="p-4 space-y-2">

                    <h3 class="font-medium text-slate-800 dark:text-white truncate">

                        {{ banner.titulo }}

                    </h3>

                    <p class="text-xs text-slate-400 line-clamp-2">

                        {{ banner.descripcion }}

                    </p>


                    <!-- acciones -->

                    <div class="flex items-center gap-4 text-xs pt-2">

                        <button (click)="editBanner(banner)" class="font-semibold text-slate-600 dark:text-slate-300
                            hover:text-orange-500 transition">

                            Editar

                        </button>

                        <button (click)="deleteBanner(banner.id_banner)"
                            class="font-semibold text-slate-400 hover:text-red-500 transition">

                            Eliminar

                        </button>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>


<div *ngIf="showModal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">

    <div class="bg-white dark:bg-[#020617]
border border-slate-200 dark:border-slate-800
w-full max-w-lg rounded-xl p-6 space-y-4">

        <h3 class="text-lg font-semibold text-slate-800 dark:text-white">
            {{ editingBannerId ? 'Editar banner' : 'Crear nuevo banner' }}
        </h3>

        <input type="text" [(ngModel)]="titulo" placeholder="Título" class="w-full px-4 py-2 text-sm
bg-slate-50 dark:bg-slate-900
border border-slate-200 dark:border-slate-700
rounded-lg" />


        <textarea [(ngModel)]="descripcion" placeholder="Descripción" class="w-full px-4 py-2 text-sm
bg-slate-50 dark:bg-slate-900
border border-slate-200 dark:border-slate-700
rounded-lg"></textarea>


        <input type="text" [(ngModel)]="boton_texto" placeholder="Texto del botón" class="w-full px-4 py-2 text-sm
bg-slate-50 dark:bg-slate-900
border border-slate-200 dark:border-slate-700
rounded-lg" />


        <select [(ngModel)]="boton_link" class="w-full px-4 py-2 text-sm
bg-slate-50 dark:bg-slate-900
border border-slate-200 dark:border-slate-700
rounded-lg">

            <option *ngFor="let route of bannerRoutes" [value]="route.value">
                {{ route.label }}
            </option>

        </select>


        <input type="file" (change)="onFileSelected($event)" class="text-xs" />

        <!-- IMAGEN ACTUAL -->
        <div *ngIf="currentImage && !previewUrl" class="border border-slate-200 dark:border-slate-700
            rounded-lg overflow-hidden mt-3">

            <p class="text-xs text-slate-400 px-3 pt-2">
                Imagen actual
            </p>

            <img [src]="currentImage" class="w-full h-40 object-cover">
        </div>


        <!-- PREVIEW NUEVO -->
        <div *ngIf="previewUrl" class="border border-slate-200 dark:border-slate-700
            rounded-lg overflow-hidden mt-3">

            <p class="text-xs text-slate-400 px-3 pt-2">
                Nueva imagen
            </p>

            <img [src]="previewUrl" class="w-full h-40 object-cover">
        </div>


        <div class="flex justify-end gap-3 pt-4">

            <button (click)="closeModal()" class="px-4 py-2 text-xs font-semibold
                            border border-slate-300 dark:border-slate-700
                            rounded-md
                            text-slate-600 dark:text-slate-300
                            hover:bg-slate-100 dark:hover:bg-slate-800">

                Cancelar

            </button>


            <button (click)="createBanner()" class="px-4 py-2 text-xs font-semibold
                        bg-orange-500 text-white rounded-md
                        hover:bg-orange-600 transition">

                {{ editingBannerId ? 'Actualizar' : 'Crear' }}

            </button>

        </div>

    </div>
</div>
